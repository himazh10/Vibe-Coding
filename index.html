<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innova | Group Idea Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <h1>Innova<span>Board</span></h1>
            </div>
            <div class="header-actions">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" placeholder="Search ideas...">
                </div>
                <button class="btn-add" id="openModal">
                    <span>+</span> New Idea
                </button>
            </div>
        </header>

        <nav class="filters">
            <button class="filter-btn active" data-filter="all">All Ideas</button>
            <button class="filter-btn" data-filter="Tech">Tech</button>
            <button class="filter-btn" data-filter="Design">Design</button>
            <button class="filter-btn" data-filter="Marketing">Marketing</button>
            <button class="filter-btn" data-filter="Product">Product</button>
        </nav>

        <main class="idea-grid" id="ideaGrid">
            <!-- Ideas will be injected here -->
        </main>
    </div>

    <!-- Modal for adding new ideas -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Share Your Idea</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <form id="ideaForm">
                <div class="form-group">
                    <label for="ideaTitle">Title</label>
                    <input type="text" id="ideaTitle" placeholder="What's the big idea?" required>
                </div>
                <div class="form-group">
                    <label for="ideaCategory">Category</label>
                    <select id="ideaCategory" required>
                        <option value="Tech">Tech</option>
                        <option value="Design">Design</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Product">Product</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="ideaDesc">Description</label>
                    <textarea id="ideaDesc" rows="4" placeholder="Describe your vision..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Launch Idea</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
