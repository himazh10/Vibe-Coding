<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Student Profile</title>
    <!-- Attractive but formal font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-card">
        <div class="card-header"></div>
        <div class="card-body">
            <div class="avatar-container">
                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <h1 class="name">Hanees Mohamed Himash</h1>
            <p class="stream">Computer Science & AI</p>
            <p class="bio">
                Passionate about software engineering and machine learning. 
                Focusing on building scalable web applications and exploring 
                data-driven solutions for real-world challenges.
            </p>
            <div class="footer">
                <button class="btn-connect">Connect with me</button>
            </div>
        </div>
    </div>
</body>
</html>
